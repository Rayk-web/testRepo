<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>과일 덧셈 팡팡!</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #f0f9ff; }
        .fruit-container { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .fruit { font-size: 60px; cursor: pointer; transition: transform 0.2s; border: 2px solid #ccc; padding: 15px; border-radius: 20px; background: white; }
        .fruit:hover { transform: scale(1.1); }
        #target-num { font-size: 48px; color: #ff6b6b; font-weight: bold; }
        #current-sum { font-size: 32px; margin: 20px 0; }
        button { padding: 10px 25px; font-size: 20px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>🍎 과일 덧셈 팡팡! 🍊</h1>
    <p>과일을 클릭해서 합계가 <span id="target-num">10</span>이 되게 만들어보세요!</p>
    
    <div id="current-sum">현재 합계: 0</div>
    
    <div class="fruit-container">
        <div class="fruit" onclick="addFruit(1)">🍉<br>1</div>
        <div class="fruit" onclick="addFruit(2)">🍎<br>2</div>
        <div class="fruit" onclick="addFruit(3)">🍓<br>3</div>
        <div class="fruit" onclick="addFruit(4)">🍊<br>4</div>
        <div class="fruit" onclick="addFruit(5)">🍋<br>5</div>
        <div class="fruit" onclick="addFruit(6)">🍇<br>6</div>
    </div>

    <button onclick="resetGame()">다시 시작하기</button>

    <script>
        let currentSum = 0;
        const target = 10;

        function addFruit(value) {
            currentSum += value;
            document.getElementById('current-sum').innerText = "현재 합계: " + currentSum;
            
            if (currentSum === target) {
                alert("와! 정답이에요! 합계가 10이 되었어요! 🎉");
                resetGame();
            } else if (currentSum > target) {
                alert("앗, 10이 넘었어요! 다시 해볼까요? 😅");
                resetGame();
            }
        }

        function resetGame() {
            currentSum = 0;
            document.getElementById('current-sum').innerText = "현재 합계: 0";
        }
    </script>
</body>
</html>
